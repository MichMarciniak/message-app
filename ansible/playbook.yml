---
- name: Deploy message app
  hosts: app_servers
  become: true

  vars:
    app_repo: "https://github.com/MichMarciniak/message-app.git"
    app_dir: "/opt/message-app"
    session_secret_key: "{{ lookup('password', '/dev/null length=64 chars=hexdigits') | lower }}"
    totp_secret_key: "{{ lookup('password', '/dev/null length=64 chars=hexdigits') | lower }}"
  
  tasks: # swap bo b2ats ma 1 gib ram
    - name: Utwórz plik swap 2GB
      command: fallocate -l 2G /swapfile
      args:
        creates: /swapfile #nie wykona ponownie jak już jest

    - name: Ustaw uprawnienia swap
      file:
        path: /swapfile
        mode: '0600'

    - name: Sformatuj plik jako swap
      command: mkswap /swapfile
      when: ansible_swaptotal_mb < 100 # czyli jak nie ma swap


    - name: Włącz swap
      command: swapon /swapfile
      when: ansible_swaptotal_mb < 100

    - name: Dodaj swap do fstab
      lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present
    - name: Zaktualizuj cache apt
      apt:
        update_cache: true

    - name: Zainstaluj wymagane pakiety systemowe
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
        state: present

    - name: Upewnij się, że katalog keyrings istnieje
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Dodaj klucz GPG Dockera (ASCII)
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Przekonwertuj klucz do formatu binarnego (dearmor)
      command: gpg --dearmor -o /etc/apt/keyrings/docker.gpg /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Dodaj repozytorium Dockera
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
    
    - name: Zainstaluj docker i docker-compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Dodaj uzytkownika do grupy docker
      user:
        name: azureuser
        groups: docker
        append: true

    - name: Sklonuj repo aplikacji
      git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dir }}"
        version: main

    - name: Wygeneruj .env z template
      template:
        src: templates/env.j2
        dest: "{{ app_dir }}/.env"
        mode: '0600'

    - name: Utwórz katalogi
      file:
        path: "{{ app_dir }}/{{ item }}"
        state: directory
        mode: '0777'
      loop:
        - backend/data
        - nginx/certs

    - name: Wygeneruj self-signed certyfikat SSL
      command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:4096
        -keyout {{ app_dir }}/nginx/certs/selfsigned.key
        -out {{ app_dir }}/nginx/certs/selfsigned.crt
        -subj "/CN={{ ansible_host }}"
      args:
        creates: "{{ app_dir }}/nginx/certs/selfsigned.crt"


    - name: Uruchom docker compose
      command: docker compose up --build -d
      args:
        chdir: "{{ app_dir }}"